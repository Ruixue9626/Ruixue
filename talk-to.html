<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talk to.</title>
    <link rel="icon" href="https://ruixue.cc.cd/image/Talk to.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FFF9FB; color: #1A1A1A; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        /* 側邊欄與選單動畫 */
        #sidebar { transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); }
        .sidebar-open { transform: translateX(0) !important; }
        
        /* 漢堡線變 X 動畫 */
        .nav-icon { cursor: pointer; width: 24px; height: 18px; position: relative; }
        .nav-icon span { display: block; position: absolute; height: 2px; width: 100%; background: #4A4A4A; border-radius: 9px; opacity: 1; transition: .25s ease-in-out; }
        .nav-icon span:nth-child(1) { top: 0px; }
        .nav-icon span:nth-child(2) { top: 8px; }
        .nav-icon span:nth-child(3) { top: 16px; }
        .nav-icon.open span:nth-child(1) { top: 8px; transform: rotate(135deg); }
        .nav-icon.open span:nth-child(2) { opacity: 0; left: -60px; }
        .nav-icon.open span:nth-child(3) { top: 8px; transform: rotate(-135deg); }

        /* iPhone 底部彈窗 */
        .ios-popup { transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.3s; transform: translateY(110%); }
        .popup-active .ios-popup { transform: translateY(0); opacity: 1; }
        .popup-active { pointer-events: auto !important; }
        .popup-active .overlay { opacity: 1; pointer-events: auto; visibility: visible; }
        .overlay { visibility: hidden; pointer-events: none; transition: opacity 0.3s, visibility 0.3s; }

        /* Material Icons 微調 */
        .material-symbols-rounded {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }

        .pill-btn { border-radius: 999px; background: #FFD6E7; color: #D63384; font-weight: 500; padding: 6px 20px; transition: 0.2s; }
        .pill-btn:active { transform: scale(0.95); opacity: 0.8; }
        .figma-card { background: white; border-radius: 28px; box-shadow: 0 4px 20px rgba(255, 182, 193, 0.12); }
        
        /* 隱藏滾動條 */
        ::-webkit-scrollbar { width: 0; }

        /* 頁面切換動畫 */
        .page-animation {
            animation: pageFadeIn 0.5s cubic-bezier(0.32, 0.72, 0, 1) forwards;
            will-change: transform, opacity;
        }
        @keyframes pageFadeIn {
            from { opacity: 0; transform: translate3d(0, 15px, 0) scale(0.98); }
            to { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
        }

        /* 橫幅按鈕動畫 */
        .header-btn {
            transition: all 0.5s cubic-bezier(0.32, 0.72, 0, 1);
            opacity: 1;
            transform: scale(1);
            display: inline-flex;
            align-items: center;
            overflow: hidden;
            width: 36px; /* 稍微增加寬度確保點擊區域與視覺平衡 */
            justify-content: center;
        }
        .header-btn.btn-hidden {
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
            width: 0;
            margin-left: 0 !important;
            margin-right: 0 !important;
        }
    </style>
</head>
<body>

    <div id="agreement-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-[#FFF9FB]">
        <div class="w-[85%] max-w-sm p-8 figma-card text-center">
            <h2 class="text-xl font-bold mb-6">服務協議</h2>
            <div class="h-40 overflow-y-auto text-left text-sm text-gray-400 mb-8 leading-relaxed">
                在使用 Talk to. 之前，你需要接受我們會把你的日記傳給cohere ai去做ai回覆。您的隱私對我們非常重要
            </div>
            <button onclick="acceptAgreement()" class="w-full py-4 pill-btn !bg-pink-400 !text-white text-lg">同意並開始</button>
        </div>
    </div>

    <header class="fixed top-0 w-full h-16 bg-white/80 backdrop-blur-md flex items-center justify-between px-6 z-50 border-b border-pink-50">
        <div class="flex items-center">
            <div class="flex items-center shrink-0">
                <div id="nav-btn" class="nav-icon header-btn" onclick="toggleSidebar()">
                    <span></span><span></span><span></span>
                </div>
                <button id="header-back" onclick="navTo('records')" class="header-btn btn-hidden text-gray-400 flex items-center justify-center">
                    <span class="material-symbols-rounded">arrow_back_ios_new</span>
                </button>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 shrink-0 ml-3">Talk to.</h1>
        </div>
        <div class="flex items-center">
            <span id="current-location" class="pill-btn text-sm">首頁</span>
            <button id="header-add" onclick="navTo('diary', true)" class="header-btn text-pink-400 p-1 ml-3">
                <span class="material-symbols-rounded">add</span>
            </button>
            <button id="header-share" onclick="openShare()" class="header-btn btn-hidden text-pink-400 p-1 ml-3">
                <span class="material-symbols-rounded">share</span>
            </button>
        </div>
    </header>

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/10 opacity-0 pointer-events-none transition-opacity z-40"></div>
    <aside id="sidebar" class="fixed top-16 left-0 w-64 h-full bg-white z-40 -translate-x-full border-r border-pink-50 p-6">
        <nav class="space-y-4">
            <button onclick="navTo('diary', true)" class="w-full text-left py-3 px-4 rounded-2xl hover:bg-pink-50 font-medium">📝 日記</button>
            <button onclick="navTo('records')" class="w-full text-left py-3 px-4 rounded-2xl hover:bg-pink-50 font-medium">📚 記錄</button>
        </nav>
    </aside>

    <main class="pt-24 pb-20 px-6 max-w-2xl mx-auto">
        <div id="page-diary" class="space-y-6 page-animation">
            <div class="figma-card p-6 md:p-8">
                <input id="diary-title" type="text" placeholder="標題" class="w-full text-2xl font-bold border-none outline-none mb-4 placeholder-gray-300">
                <textarea id="diary-content" placeholder="今天過的還好嗎？" class="w-full h-64 border-none outline-none resize-none leading-relaxed text-gray-700 placeholder-gray-200"></textarea>
                
                <div id="diary-actions" class="flex gap-4 mt-6">
                    <button onclick="togglePopup('mood-popup')" id="mood-btn" class="flex-1 py-4 bg-rose-50 text-pink-400 rounded-2xl font-bold flex items-center justify-center gap-2">
                        <span id="selected-emoji">😊</span> 心情
                    </button>
                    <button onclick="saveDiary()" class="flex-[2] py-4 bg-pink-400 text-white rounded-2xl font-bold shadow-lg shadow-pink-100">完成</button>
                </div>
            </div>

            <div id="ai-response" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
                <p class="text-[10px] text-gray-400 tracking-widest uppercase mb-2 ml-4">AI SUGGESTION</p>
                <div class="bg-white border-2 border-pink-100 p-6 rounded-[2rem] text-gray-600 leading-relaxed italic shadow-sm relative">
                    <div class="absolute -top-3 left-6 px-2 bg-[#FFF9FB] text-pink-300">✨</div>
                    <p id="ai-text">...</p>
                </div>
                <div id="post-ai-actions" class="hidden flex gap-4 mt-6">
                    <button onclick="navTo('records')" class="flex-1 py-3 bg-gray-100 text-gray-500 rounded-2xl font-bold">查看記錄</button>
                    <button onclick="navTo('diary', true)" class="flex-1 py-3 bg-pink-100 text-pink-400 rounded-2xl font-bold">寫新日記</button>
                </div>
            </div>
        </div>

        <div id="page-records" class="hidden space-y-6 page-animation">
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-xl font-bold">歷史記錄</h2>
                <select id="sort-select" onchange="renderRecords()" class="bg-transparent text-sm text-pink-400 font-medium outline-none">
                    <option value="new">最新日期</option>
                    <option value="old">最舊日期</option>
                    <option value="mood">依照心情</option>
                </select>
            </div>
            <div id="records-list" class="space-y-4"></div>
        </div>
    </main>

    <!-- 新增的分享內容顯示區塊 -->
    <div id="page-share" class="hidden pt-24 pb-20 px-6 max-w-2xl mx-auto page-animation">
        <div class="figma-card p-6 md:p-8">
            <h2 id="share-title" class="text-2xl font-bold mb-4 text-gray-900"></h2>
            <p id="share-content" class="leading-relaxed text-gray-700 mb-4"></p>
            <div class="flex justify-between items-center text-sm text-gray-400">
                <span id="share-time"></span>
                <span id="share-mood" class="text-2xl"></span>
            </div>
        </div>
        <div class="text-center mt-8">
            <!-- 點擊此按鈕會回到日記編輯頁面 -->
            <button onclick="navTo('diary')" class="py-3 px-6 pill-btn !bg-pink-400 !text-white">回到我的日記</button>
        </div>
    </div>

    <div id="mood-popup" class="fixed inset-0 z-[70] pointer-events-none">
        <div class="overlay absolute inset-0 bg-black/30 backdrop-blur-sm opacity-0 transition-opacity" onclick="togglePopup('mood-popup')"></div>
        <div class="ios-popup absolute bottom-0 left-0 right-0 bg-white rounded-t-[3rem] p-8 pb-12 flex flex-col items-center shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
            <div class="w-10 h-1.5 bg-gray-200 rounded-full mb-8"></div>
            <h3 class="font-bold text-gray-800 mb-6">現在感覺如何？</h3>
            <div class="grid grid-cols-4 gap-6 mb-8">
                <button onclick="selectMood('😊')" class="text-3xl p-2 active:scale-90 transition-transform">😊</button>
                <button onclick="selectMood('😭')" class="text-3xl p-2 active:scale-90 transition-transform">😭</button>
                <button onclick="selectMood('🥰')" class="text-3xl p-2 active:scale-90 transition-transform">🥰</button>
                <button onclick="selectMood('😡')" class="text-3xl p-2 active:scale-90 transition-transform">😡</button>
                <button onclick="selectMood('😴')" class="text-3xl p-2 active:scale-90 transition-transform">😴</button>
                <button onclick="selectMood('✨')" class="text-3xl p-2 active:scale-90 transition-transform">✨</button>
                <button onclick="selectMood('🌸')" class="text-3xl p-2 active:scale-90 transition-transform">🌸</button>
                <button onclick="selectMood('☁️')" class="text-3xl p-2 active:scale-90 transition-transform">☁️</button>
            </div>
            <button onclick="togglePopup('mood-popup')" class="w-full py-4 bg-gray-50 rounded-2xl font-bold text-gray-400 active:scale-95 transition-transform">取消</button>
        </div>
    </div>

    <div id="share-popup" class="fixed inset-0 z-[70] pointer-events-none">
        <div class="overlay absolute inset-0 bg-black/30 backdrop-blur-sm opacity-0 transition-opacity" onclick="togglePopup('share-popup')"></div>
        <div class="ios-popup absolute bottom-0 left-0 right-0 bg-white rounded-t-[3rem] p-8 pb-12 flex flex-col items-center shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
            <div class="w-10 h-1.5 bg-gray-200 rounded-full mb-6"></div>
            <span class="text-pink-400 font-bold italic mb-4">Talk to.</span>
            <div id="qrcode-box" class="bg-white p-4 rounded-3xl border-4 border-pink-50 mb-6"></div>
            <p class="text-xs text-gray-400 mb-8">分享這份心情給重要的人吧</p>
            <button onclick="togglePopup('share-popup')" class="w-full py-4 bg-gray-100 rounded-2xl font-bold text-gray-500">關閉</button>
        </div>
    </div>

    <script>
        const API_KEY = 'BGj8qX6a0T8ZHqKFiMD7Q3BbMG8KZxDQaJi5Eap6'; // 這裡、這裡要填 Key 喔！
        let diaries = JSON.parse(localStorage.getItem('talkto_v3_data') || '[]');
        let currentMood = '😊';
        let currentDiary = null;
        let isSharingView = false; // 新增變數來追蹤是否處於分享頁面

        // 協議與初始化
        window.onload = () => {
            if (localStorage.getItem('accepted_v3')) {
                document.getElementById('agreement-modal').style.display = 'none';
            }
            const sharedData = parseShareLink(); // 嘗試解析分享連結
            if (sharedData) {
                displaySharedDiary(sharedData);
                isSharingView = true;
            } else if (localStorage.getItem('accepted_v3')) { // 只有在同意協議後才導航到日記頁
                navTo('diary');
            }
        };
        function acceptAgreement() { localStorage.setItem('accepted_v3', 't'); document.getElementById('agreement-modal').style.display = 'none'; }

        // 導覽邏輯
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-open');
            document.getElementById('sidebar-overlay').classList.toggle('opacity-100');
            document.getElementById('sidebar-overlay').classList.toggle('pointer-events-auto');
            document.getElementById('nav-btn').classList.toggle('open');
        }

        function navTo(page, forceNew = false) {
            // 如果從分享頁面導航離開，清除 URL hash
            if (isSharingView && page !== 'share') {
                history.replaceState(null, '', window.location.pathname + window.location.search); // 移除 hash
                isSharingView = false; // 重設旗標
            }

            if (forceNew && page === 'diary') {
                clearForm();
            }

            // 切換分頁並觸發動畫
            const pageIds = ['page-diary', 'page-records', 'page-share'];
            pageIds.forEach(id => {
                const el = document.getElementById(id);
                const isTarget = (id === `page-${page}`);
                el.classList.toggle('hidden', !isTarget);
                if (isTarget) {
                    el.classList.remove('page-animation');
                    void el.offsetWidth; // 強制重繪以重啟動畫
                    el.classList.add('page-animation');
                }
            });

            document.getElementById('current-location').innerText = (page === 'diary' && !currentDiary) ? '首頁' : (page === 'records' ? '記錄' : '回顧');
            
            // 處理橫幅按鈕動畫
            const headerShare = document.getElementById('header-share');
            const headerBack = document.getElementById('header-back');
            const navBtn = document.getElementById('nav-btn');
            const headerAdd = document.getElementById('header-add');

            headerShare.classList.add('btn-hidden');
            headerBack.classList.add('btn-hidden');
            navBtn.classList.remove('btn-hidden');
            headerAdd.classList.remove('btn-hidden');

            if(page === 'diary' && !currentDiary) clearForm();
            if(page === 'records') renderRecords();
            if(page === 'share') headerAdd.classList.add('btn-hidden');
            
            if(document.getElementById('sidebar').classList.contains('sidebar-open')) toggleSidebar();
        }

        // 彈窗控制
        function togglePopup(id) {
            document.getElementById(id).classList.toggle('popup-active');
            document.getElementById(id).classList.toggle('pointer-events-auto');
        }

        function selectMood(m) {
            currentMood = m;
            document.getElementById('selected-emoji').innerText = m;
            togglePopup('mood-popup');
        }

        function clearForm() {
            currentDiary = null;
            document.getElementById('diary-title').value = '';
            document.getElementById('diary-content').value = '';
            document.getElementById('selected-emoji').innerText = '😊';
            document.getElementById('diary-title').readOnly = false;
            document.getElementById('diary-content').readOnly = false;
            document.getElementById('diary-actions').classList.remove('hidden');
            currentMood = '😊';
            document.getElementById('ai-response').classList.add('hidden');
            document.getElementById('post-ai-actions').classList.add('hidden');
        }

        // 儲存與 AI 串接
        async function saveDiary() {
            const title = document.getElementById('diary-title').value;
            const content = document.getElementById('diary-content').value;
            if(!title || !content) return;
            
            if(!confirm('確定要送出這篇日記嗎？送出後就不能修改囉！')) return;

            let diaryObj;
            if (currentDiary) {
                // 編輯現有日記
                const index = diaries.findIndex(d => d.id === currentDiary.id);
                if (index !== -1) {
                    diaries[index] = { ...currentDiary, title, content, mood: currentMood };
                    diaryObj = diaries[index];
                }
            } else {
                // 新增日記
                const now = new Date();
                const timeStr = `${now.getFullYear().toString().slice(-2)}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}`;
                diaryObj = { title, content, mood: currentMood, time: timeStr, id: Date.now(), aiResponse: "" };
                diaries.unshift(diaryObj);
            }

            localStorage.setItem('talkto_v3_data', JSON.stringify(diaries));
            
            // 鎖定 UI
            document.getElementById('diary-title').readOnly = true;
            document.getElementById('diary-content').readOnly = true;
            document.getElementById('diary-actions').classList.add('hidden');

            // AI UI 動效
            const aiBox = document.getElementById('ai-response');
            const aiText = document.getElementById('ai-text');
            aiBox.classList.remove('hidden');
            aiText.innerText = '正在傾聽妳的心聲...';
            document.getElementById('post-ai-actions').classList.add('hidden');

            try {
                const response = await fetch('https://api.cohere.ai/v1/chat', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `我寫了一篇日記：標題是「${title}」，內容是「${content}」。`,
                        preamble: "請針對她的日記內容，給予一段建議或是安慰、簡短（60字內）的回應。請用繁體中文回應。",
                    })
                });

                const data = await response.json();
                if (response.ok) {
                    const responseText = data.text.trim();
                    aiText.innerText = responseText;
                    // 儲存 AI 回覆
                    const idx = diaries.findIndex(d => d.id === diaryObj.id);
                    if(idx !== -1) diaries[idx].aiResponse = responseText;
                    localStorage.setItem('talkto_v3_data', JSON.stringify(diaries));
                    document.getElementById('post-ai-actions').classList.remove('hidden');
                } else {
                    throw new Error();
                }
            } catch (e) {
                aiText.innerText = "抱歉Ai暫時不可以使用，但是幫底儲存了你的日記喔！";
                document.getElementById('post-ai-actions').classList.remove('hidden');
            }
        }

        function deleteDiary(id, event) {
            event.stopPropagation(); // 防止觸發點擊卡片進入編輯
            if (!confirm('確定要刪除這篇記錄嗎？')) return;
            diaries = diaries.filter(d => d.id !== id);
            localStorage.setItem('talkto_v3_data', JSON.stringify(diaries));
            renderRecords();
        }

        // 渲染記錄
        function renderRecords() {
            const container = document.getElementById('records-list');
            const sort = document.getElementById('sort-select').value;
            container.innerHTML = '';
            let list = [...diaries];
            if(sort === 'old') list.reverse();

            if(sort === 'mood') {
                const grouped = list.reduce((acc, d) => { (acc[d.mood] = acc[d.mood] || []).push(d); return acc; }, {});
                for(let m in grouped) {
                    const groupTitle = document.createElement('div');
                    groupTitle.className = "text-xs font-bold text-pink-300 mt-6 mb-2 ml-2";
                    groupTitle.innerText = `${m} 的回憶`;
                    container.appendChild(groupTitle);
                    grouped[m].forEach(d => container.appendChild(createCard(d)));
                }
            } else {
                list.forEach(d => container.appendChild(createCard(d)));
            }
        }

        function createCard(d) {
            const el = document.createElement('div');
            el.className = "figma-card p-5 flex justify-between items-center cursor-pointer";
            el.onclick = () => {
                currentDiary = d;
                const diaryPage = document.getElementById('page-diary');
                document.getElementById('page-records').classList.add('hidden');
                diaryPage.classList.remove('hidden');
                
                // 觸發回顧頁面動畫
                diaryPage.classList.remove('page-animation');
                void diaryPage.offsetWidth;
                diaryPage.classList.add('page-animation');

                document.getElementById('diary-title').value = d.title;
                document.getElementById('diary-content').value = d.content;
                document.getElementById('selected-emoji').innerText = d.mood;
                
                // 唯讀模式處理
                document.getElementById('diary-title').readOnly = true;
                document.getElementById('diary-content').readOnly = true;
                document.getElementById('diary-actions').classList.add('hidden');
                
                // 顯示儲存的 AI 回覆
                if(d.aiResponse) {
                    document.getElementById('ai-response').classList.remove('hidden');
                    document.getElementById('ai-text').innerText = d.aiResponse;
                    document.getElementById('post-ai-actions').classList.add('hidden');
                } else {
                    document.getElementById('ai-response').classList.add('hidden');
                }

                document.getElementById('header-share').classList.remove('btn-hidden');
                document.getElementById('header-back').classList.remove('btn-hidden');
                document.getElementById('nav-btn').classList.add('btn-hidden');
                document.getElementById('current-location').innerText = '回顧';
            };
            el.innerHTML = `
                <div><h4 class="font-bold text-gray-800">${d.title}</h4><p class="text-[10px] text-gray-400 mt-1">${d.time}</p></div>
                <div class="flex items-center gap-4">
                    <span class="text-2xl">${d.mood}</span>
                    <button onclick="deleteDiary(${d.id}, event)" class="p-2 text-gray-300 hover:text-rose-400 transition-colors flex items-center justify-center">
                        <span class="material-symbols-rounded !text-[20px]">delete</span>
                    </button>
                </div>`;
            return el;
        }

        // 分享 QR Code (修正後的邏輯)
        function openShare() {
            if(!currentDiary) return;
            const qbox = document.getElementById('qrcode-box');
            qbox.innerHTML = '';
            
            // 縮短內容長度並簡化格式以確保 QR Code 能生成
            const shortContent = currentDiary.content.length > 100 ? currentDiary.content.substring(0, 100) + '...' : currentDiary.content;
            const shareLink = `https://talk-to.onrender.com/#/s?t=${encodeURIComponent(currentDiary.title)}&c=${encodeURIComponent(shortContent)}&d=${currentDiary.time}&m=${encodeURIComponent(currentDiary.mood)}`;
            
            try {
                new QRCode(qbox, {
                    text: shareLink,
                    width: 200,
                    height: 200,
                    colorDark: "#D63384",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.M
                });
                togglePopup('share-popup');
            } catch (err) {
                alert("內容太長了，沒辦法生成 QR Code... 嗚...");
            }
        }

        // 解析分享連結的參數
        function parseShareLink() {
            const hash = window.location.hash;
            if (hash.startsWith('#/s?')) {
                const params = new URLSearchParams(hash.substring(hash.indexOf('?')));
                return {
                    title: decodeURIComponent(params.get('t') || '無標題日記'),
                    content: decodeURIComponent(params.get('c') || '無內容'),
                    time: decodeURIComponent(params.get('d') || ''),
                    mood: decodeURIComponent(params.get('m') || '😊')
                };
            }
            return null; // 沒有找到分享連結
        }

        // 顯示分享的日記內容
        function displaySharedDiary(data) {
            // 隱藏所有主要內容頁面
            document.getElementById('page-diary').classList.add('hidden');
            document.getElementById('page-records').classList.add('hidden');

            // 顯示分享頁面
            document.getElementById('page-share').classList.remove('hidden');

            // 填充內容
            document.getElementById('share-title').innerText = data.title;
            document.getElementById('share-content').innerText = data.content;
            document.getElementById('share-time').innerText = data.time;
            document.getElementById('share-mood').innerText = data.mood;

            document.getElementById('current-location').innerText = '分享';
        }
    </script>
</body>
</html>
