<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruixue</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@700&display=swap">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 24px;
            color: #000000;
            -webkit-font-smoothing: antialiased;
        }

        .fixed-actions {
            position: fixed;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 10px;
            z-index: 999;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.10);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #222;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
            text-decoration: none;
        }

        .action-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .action-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.14);
            background: rgba(255, 245, 246, 0.98);
        }

        .action-btn:active { transform: scale(0.96); }

        .container {
            max-width: 400px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
        }

        .name {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 0.85rem;
            font-weight: 500;
            color: #333333;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;
            margin-bottom: 18px;
        }

        .icon-link {
            color: #000000;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .icon-link svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            display: block;
        }

        .icon-link:hover {
            transform: scale(1.15);
            color: #e06b7d;
        }

        .extra-bio {
            font-size: 0.82rem;
            font-weight: 400;
            line-height: 1.6;
            color: #222222;
            margin-bottom: 30px;
            white-space: pre-line;
            letter-spacing: 0.2px;
        }

        .about-box {
            background-color: #fff5f6;
            border-radius: 24px;
            padding: 24px 22px;
            width: 100%;
            text-align: left;
            margin-bottom: 20px;
        }

        .about-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .about-content {
            font-size: 0.85rem;
            line-height: 1.65;
            font-weight: 400;
            color: #2b2b2b;
            white-space: pre-line;
            letter-spacing: 0.3px;
        }

        .image-box {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #f0f0f0;
            aspect-ratio: 350/250;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }

        .image-box:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
            transform: translateY(-2px);
        }

        .image-box-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(30, 30, 30, 0.88);
            color: #fff;
            font-size: 0.82rem;
            padding: 10px 20px;
            border-radius: 99px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
            white-space: nowrap;
            font-family: 'Noto Sans TC', sans-serif;
            backdrop-filter: blur(8px);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

    <script>
        document.getElementById('shareBtn').addEventListener('click', async () => {
            const url = window.location.href;
            if (navigator.share) {
                try { await navigator.share({ title: "Ruixue's Profile", url }); } catch {}
            } else {
                try {
                    await navigator.clipboard.writeText(url);
                    showToast('連結已複製！');
                } catch { showToast('複製失敗 QQ'); }
            }
        });

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2200);
        }
    </script>
