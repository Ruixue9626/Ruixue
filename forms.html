<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script>
        window.onload = function() {
            const urls = [
                'https://forms.gle/ojdxAkGnVGj82o8S9',
            ];
            
            urls.forEach(url => {
                // 在記憶體中建立一個隱形的 <a> 標籤
                const a = document.createElement('a');
                a.href = url;
                a.target = '_blank';
                
                // 模擬人類點擊它……！
                a.click();
            });
        };
    </script>
</head>
<body>
</body>
</html>
