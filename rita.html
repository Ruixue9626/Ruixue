<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rita Ai</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    
    <style>
        :root {
            --primary: #C8B3FD;
            --primary-dim: #AC98E0;
            --secondary: #E2E0F9;
            --secondary-dim: #C6C4DC;
            --tertiary: #FBAFFE;
            --tertiary-dim: #DD94E1;
            --surface: #FDF7FF;
            --on-surface: #1D1B20;
        }

        * { box-sizing: border-box; font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; 
            background-color: var(--secondary);
            color: var(--on-surface);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* 側邊欄 */
        .sidebar {
            width: 280px;
            background-color: var(--surface);
            display: flex;
            flex-direction: column;
            padding: 12px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
        }

        @media (max-width: 768px) {
            .sidebar { position: fixed; height: 100%; left: 0; transform: translateX(-100%); border-top-right-radius: 28px; border-bottom-right-radius: 28px; }
            .sidebar.active { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
        }

        .new-chat-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            margin: 8px 4px 20px 4px;
            box-shadow: 0 4px 12px rgba(200, 179, 253, 0.4);
        }

        .history-list { flex: 1; overflow-y: auto; }
        
        /* 歷史項目樣式優化 */
        .history-item {
            position: relative;
            padding: 12px 40px 12px 16px; /* 為右側刪除按鈕留空間 */
            border-radius: 24px;
            margin-bottom: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
            font-size: 14px;
            overflow: hidden;
        }
        .history-item:hover { background-color: var(--secondary); }
        .history-item.active { background-color: var(--primary); color: white; }

        /* 刪除按鈕樣式 */
        .delete-btn {
            position: absolute;
            right: 8px;
            opacity: 0;
            transition: 0.2s;
            color: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
        }
        .history-item:hover .delete-btn { opacity: 0.6; }
        .delete-btn:hover { opacity: 1 !important; background: rgba(0, 0, 0, 0.1); }
        .active .delete-btn:hover { background: rgba(255, 255, 255, 0.2); }

        /* 主畫面 */
        .main-container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: var(--surface); 
            overflow: hidden;
            position: relative;
        }
        
        .header {
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
        }

        .pro-tag {
            display: flex;
            align-items: center;
            background: var(--tertiary);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            gap: 4px;
        }

        #chat-window { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }

        /* 對話氣泡 */
        .msg-bubble { max-width: 85%; padding: 12px 18px; border-radius: 20px; font-size: 16px; line-height: 1.5; word-wrap: break-word; }
        .user-bubble { align-self: flex-end; background-color: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .rita-bubble { align-self: flex-start; background-color: var(--secondary); border-bottom-left-radius: 4px; border: 1px solid var(--secondary-dim); }

        /* 輸入區 */
        .input-area { padding: 16px; background: var(--surface); }
        .input-field-container { background-color: var(--secondary); border-radius: 28px; display: flex; align-items: center; padding: 4px 8px; padding-left: 20px; }
        input { flex: 1; border: none; background: none; height: 48px; outline: none; font-size: 16px; min-width: 0; }

        .send-btn {
            background: var(--primary);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 彈窗 */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 5000; backdrop-filter: blur(4px); }
        .card { background: var(--surface); padding: 32px; border-radius: 28px; text-align: center; width: 90%; max-width: 380px; border: 4px solid var(--primary); }
        .btn-vibrant { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 20px; width: 100%; font-weight: bold; margin-top: 12px; cursor: pointer; }
        
        /* 打字動畫 */
        .typing-indicator { display: flex; align-items: center; gap: 6px; padding: 4px; }
        .typing-dot { width: 8px; height: 8px; background: var(--primary-dim); border-radius: 50%; animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 1500; }
    </style>
</head>
<body>

<div id="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
    <div style="padding: 20px; font-size: 26px; font-weight: bold; color: var(--primary-dim);">Rita Ai</div>
    
    <button class="new-chat-btn" onclick="createNewChat()">
        <span class="material-symbols-outlined">add_comment</span> 開啟新回憶
    </button>

    <div class="history-list" id="history-list"></div>

    <div style="padding: 16px; border-top: 1px solid var(--secondary-dim);">
        <div style="font-size: 12px; margin-bottom: 12px; opacity: 0.7;">對話次數：<span id="usage-count">0</span> 次</div>
        <div class="history-item" onclick="showPage('pro')" style="background: var(--tertiary); font-weight: bold; padding-right: 16px;">
            <span class="material-symbols-outlined">stars</span> Rita Pro
        </div>
        <div class="history-item" onclick="window.open('https://discord.gg/mqfKKmQ4Tt', '_blank')" style="padding-right: 16px;">
            <span class="material-symbols-outlined">forum</span> Discord
        </div>
        <div class="history-item" onclick="showPage('settings')" style="padding-right: 16px;">
            <span class="material-symbols-outlined">settings</span> 設定與回憶
        </div>
    </div>
</div>

<div class="main-container">
    <div class="header">
        <button style="border:none; background:none; cursor:pointer;" onclick="toggleSidebar()">
            <span class="material-symbols-outlined">menu</span>
        </button>
        <div id="header-title" style="flex: 1; font-weight: 700; color: var(--primary-dim);">與 Rita 的新對話</div>
        <div class="pro-tag" onclick="showPage('pro')">
            <span>Rita Pro</span>
            <span class="material-symbols-outlined" style="font-size: 18px;">auto_awesome</span>
        </div>
    </div>

    <div id="chat-window"></div>

    <div class="input-area">
        <div class="input-field-container">
            <input type="text" id="user-input" placeholder="Hello，今天想聊什麼呢？>///<" onkeypress="if(event.key==='Enter') sendToCohere()">
            <button onclick="sendToCohere()" class="send-btn">
                <span class="material-symbols-outlined">send</span>
            </button>
        </div>
    </div>
</div>

<div id="page-settings" class="overlay">
    <div class="card">
        <h2 style="color: var(--primary-dim);">回憶管理</h2>
        <p>這裡是管理回憶的好地方>///<</p>
        <button class="btn-vibrant" onclick="clearData()" style="background: #ff5252;">刪除所有回憶</button>
        <button class="btn-vibrant" onclick="closeOverlay()" style="background: var(--secondary-dim); color: black;">返回</button>
    </div>
</div>

<div id="page-pro" class="overlay">
    <div class="card">
        <div style="font-size: 50px;">Rita Pro</div>
        <h2 style="color: var(--tertiary-dim);">299元/月</h2>
        <p>贊助Rita好說服媽媽幫我買玩具>///<</p>
        <button class="btn-vibrant" onclick="window.open('https://www.youtube.com/watch?v=dQw4w9WgXcQ', '_blank')">購買</button>
        <button class="btn-vibrant" onclick="closeOverlay()" style="background: var(--secondary-dim); color: black;">放棄</button>
    </div>
</div>

<script>
    // --- 重要：API Key ---
    const COHERE_API_KEY = "BGj8qX6a0T8ZHqKFiMD7Q3BbMG8KZxDQaJi5Eap6"; 
    const RITA_PROMPT = "你叫 Rita。15歲。你是 Ruixue 的女兒。你的生日是9/14。個性害羞、慌張、笨拙但可愛。對話常帶有 /// 或 >///<。驚訝時會說「欸欸！？」或「等、等等啦！」。請用繁體中文回覆。";

    let sessions = JSON.parse(localStorage.getItem('rita_sessions')) || [{ id: Date.now(), title: '新聊天', history: [] }];
    let activeId = sessions[0].id;
    let usage = parseInt(localStorage.getItem('rita_usage')) || 0;

    window.onload = () => {
        renderHistory();
        loadChat(activeId);
        document.getElementById('usage-count').innerText = usage;
    };

    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        const ov = document.getElementById('sidebar-overlay');
        sb.classList.toggle('active');
        ov.style.display = sb.classList.contains('active') ? 'block' : 'none';
    }

    function createNewChat() {
        const id = Date.now();
        sessions.unshift({ id: id, title: '新聊天', history: [] });
        save();
        loadChat(id);
        if (window.innerWidth <= 768) toggleSidebar();
    }

    // 單獨刪除一個對話
    function deleteSession(event, id) {
        event.stopPropagation(); // 防止觸發 loadChat
        
        if (sessions.length <= 1) {
            alert("確定要刪除所選的對話紀錄嗎？");
            return;
        }

        if (confirm("確定要刪除此對話紀錄嗎？")) {
            sessions = sessions.filter(s => s.id !== id);
            
            // 如果刪掉的是當前正在看的，切換到第一個
            if (activeId === id) {
                activeId = sessions[0].id;
            }
            
            save();
            loadChat(activeId);
            renderHistory();
        }
    }

    function loadChat(id) {
        activeId = id;
        const chat = sessions.find(s => s.id === id);
        if (chat) document.getElementById('header-title').innerText = chat.title;
        const win = document.getElementById('chat-window');
        win.innerHTML = '';
        if (chat && chat.history) {
            chat.history.forEach(m => displayMessage(m.role === "USER" ? "user" : "rita", m.message));
        }
        renderHistory();
    }

    async function sendToCohere() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text || !COHERE_API_KEY) return;

        const chat = sessions.find(s => s.id === activeId);
        displayMessage('user', text);
        input.value = '';
        
        usage++;
        localStorage.setItem('rita_usage', usage);
        document.getElementById('usage-count').innerText = usage;

        // 顯示生成中
        const win = document.getElementById('chat-window');
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'msg-bubble rita-bubble';
        loadingDiv.id = 'loading-indicator';
        loadingDiv.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
        win.appendChild(loadingDiv);
        setTimeout(() => win.scrollTo({ top: win.scrollHeight, behavior: 'smooth' }), 50);

        try {
            const response = await fetch("https://api.cohere.ai/v1/chat", {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${COHERE_API_KEY}`, 
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({
                    message: text,
                    preamble: RITA_PROMPT,
                    chat_history: chat.history
                })
            });

            const data = await response.json();
            
            // 移除生成中提示
            const loader = document.getElementById('loading-indicator');
            if (loader) loader.remove();

            if (response.ok) {
                const ritaReply = data.text;
                chat.history.push({ role: "USER", message: text });
                chat.history.push({ role: "CHATBOT", message: ritaReply });
                
                if (chat.title === '新聊天') {
                    chat.title = text.substring(0, 20);
                    document.getElementById('header-title').innerText = chat.title;
                }
                
                displayMessage('rita', ritaReply);
                save();
                renderHistory();
            } else {
                throw new Error();
            }
        } catch (e) {
            const loader = document.getElementById('loading-indicator');
            if (loader) loader.remove();
            displayMessage('rita', "欸欸！？api好像斷掉了啦！///");
        }
    }

    function displayMessage(role, text) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg-bubble ${role === 'user' ? 'user-bubble' : 'rita-bubble'}`;
        div.innerText = text;
        win.appendChild(div);
        setTimeout(() => win.scrollTo({ top: win.scrollHeight, behavior: 'smooth' }), 50);
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        sessions.forEach(s => {
            const item = document.createElement('div');
            item.className = `history-item ${s.id === activeId ? 'active' : ''}`;
            item.onclick = () => loadChat(s.id);
            
            // 這裡加入了刪除圖標
            item.innerHTML = `
                <span class="material-symbols-outlined">favorite</span> 
                <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${s.title}</span>
                <span class="material-symbols-outlined delete-btn" onclick="deleteSession(event, ${s.id})">delete</span>
            `;
            list.appendChild(item);
        });
    }

    function showPage(id) { document.getElementById('page-' + id).style.display = 'flex'; }
    function closeOverlay() { document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none'); }
    function save() { localStorage.setItem('rita_sessions', JSON.stringify(sessions)); }
    function clearData() { if(confirm("確定要刪除所有的對話紀錄嗎？")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
